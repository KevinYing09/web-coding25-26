<!DOCTYPE html>
<html lang="en">
<div id="adminAuth" class="auth-overlay">

    <div class="auth-box">
        <h3>Admin Access Required</h3>
        <input type="password" id="adminPass" placeholder="Enter Password">
        <button onclick="checkAdminPass()">Login</button>
        <p id="loginError" style="color:red; display:none;">Incorrect Password</p>
    </div>
</div>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lato:ital,wght@0,100;0,300;0,400;0,700;0,900;1,100;1,300;1,400;1,700;1,900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="style.css">
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-storage-compat.js"></script>
</head>
<body>
    <nav>
        <div class="logo">
            <img src="images/logo.png" alt="School Logo" class="nav-logo">
            <span>Admin Portal</span>
        </div>
        <ul class = "navbar">
            <li><a href="index.html">Public View</a></li>
        </ul>
    </nav>

    <main>
      <h2>Manage Postings</h2>
    <div style="background:white; padding:20px; border-radius:8px; box-shadow: 0 4px 6px rgba(0,0,0,0.05);">
        <table width="100%">
            <thead>
                <tr style="text-align:left;">
                    <th>Photo</th>
                    <th>Item</th>
                    <th>Category</th> <th>Status</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="adminTable"></tbody> </table>
    </div>

      <h2>Student Claims & Inquiries</h2>
      <div style="background:white; padding:20px; border-radius:8px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); overflow-x: auto;">
          <table width="100%" style="border-collapse: collapse;">
              <thead>
                  <tr style="text-align:left; border-bottom: 2px solid #eee;">
                      <th style="padding:12px;">Item</th>
                      <th style="padding:12px;">Student</th>
                      <th style="padding:12px;">Contact</th>
                      <th style="padding:12px;">Type</th>
                      <th style="padding:12px;">Message/Question</th>
                      <th style="padding:12px;">Date</th>
                      <th style="padding:12px;">Actions</th>
                  </tr>
              </thead>
              <tbody id="requestsTable"></tbody>
          </table>
      </div>
      <div id="adminContent" style="display:none;"></div>
      </div>
    </main>
    <script src="script.js"></script>
</body>
</html>
