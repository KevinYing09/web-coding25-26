<!DOCTYPE html>
<html lang="en">
<div id="adminAuth" class="auth-overlay">

    <div class="auth-box">
        <h3>Admin Access Required</h3>
        <input type="password" id="adminPass" placeholder="Enter Password">
        <button onclick="checkAdminPass()">Login</button>
        <p id="loginError" style="color:red; display:none;">Incorrect Password</p>
    </div>
</div>

<head>
    <meta charset="UTF-8">
    <title>Admin Panel</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-storage-compat.js"></script>
</head>
<body>
    <nav>
        <div class="logo">🏫 Admin Portal</div>
        <ul>
            <li><a href="index.html">Public View</a></li>
        </ul>
    </nav>

    <main>
      <h2>Manage Postings</h2>
      <table width="100%" style="background:white; padding:20px; border-radius:8px;">
          <thead>
              <tr style="text-align:left;">
                  <th>Item</th>
                  <th>Status</th>
                  <th>Actions</th>
              </tr>
          </thead>
          <tbody id="adminTable"></tbody>
      </table>

      <h2>Student Claims & Inquiries</h2>
      <table width="100%" style="background:white; padding:20px; border-radius:8px; border-collapse: collapse;">
      <thead>
        <tr style="text-align:left; border-bottom: 2px solid #eee;">
            <th>Item Name</th>
            <th>Student Name</th>
            <th>Contact</th>
            <th>Type</th>
            <th>Message</th> <th>Date</th>
            <th>Actions</th> </tr>
      </thead>
      <tbody id="requestsTable"></tbody>
      </table>
      <div id="adminContent" style="display:none;"></div>
      </div>
    </main>
    <script src="script.js"></script>
</body>
</html>
