<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>School Lost & Found</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-storage-compat.js"></script>
</head>
<body>
    <nav>
        <div class="logo">
            <img src="images/logo.png" alt="School Logo" class="nav-logo">
            <span>Skyline Lost & Found</span>
        </div>
        <ul>
            <li><a href="index.html">View Items</a></li>
            <li><a href="report.html">Report Found Item</a></li>
            <li><a href="admin.html">Admin Panel</a></li>
        </ul>
    </nav>

    <main>
        <header>
            <h1>Lost and Found Gallery</h1>
            <input type="text" id="searchInput" placeholder="Search for an item (e.g. 'blue water bottle')...">
        </header>

        <section id="itemsGrid" class="grid"></section>

        <div id="itemModal" class="modal-overlay" onclick="closeModal()">
          <div class="modal-content" onclick="event.stopPropagation()">
            <span class="close-button" onclick="closeModal()">&times;</span>
            <img id="modalImage" src="" alt="Item Image">
            <div class="modal-details">
              <h2 id="modalName"></h2>
              <p id="modalLocation"></p>
              <p id="modalDescription"></p>
              <div id="modalActionArea"></div>
            </div>
          </div>
        </div>
    </main>
    <script src="script.js"></script>
</body>
</html>
