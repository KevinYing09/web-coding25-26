<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Report an Item</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-storage-compat.js"></script>
</head>
<body>
    <nav>
        <div class="logo">
            <img src="images/logo.png" alt="School Logo" class="nav-logo">
            <span>Skyline Lost & Found</span>
        </div>
        <ul class = "navbar">
            <li><a href="index.html">View Items</a></li>
            <li><a href="report.html" class="active">Report Found Item</a></li>
            <li><a href="admin.html">Admin Panel</a></li>
        </ul>
    </nav>

    <div class="form-container">
        <h2>Found Something?</h2>
        <form id="reportForm">
            <label>Item Name</label>
            <input type="text" id="itemName" required>
            
            <label>Location Found</label>
            <input type="text" id="location" required>
            
            <label>Upload Photo</label>
            <input type="file" id="photoFile" accept="image/*" required>
            
            <label>Category</label>
            <select id="itemCategory" required style="width: 100%; padding: 10px; margin: 10px 0 20px 0; border: 1px solid #ddd; border-radius: 5px;">
                <option value="">Select a category</option>
                <option value="electronics">Electronics</option>
                <option value="clothing">Clothing</option>
                <option value="water bottles">Water Bottles</option>
                <option value="other">Other</option>
            </select>

            <label>Description</label>
            <textarea id="description" rows="4"></textarea>
            
            <button type="submit">Submit Item</button>
        </form>
    </div>
    <script src="script.js"></script>
</body>
</html>
